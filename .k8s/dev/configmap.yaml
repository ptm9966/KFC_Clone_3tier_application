apiVersion: v1
kind: ConfigMap
metadata:
  name: kfc-config
  namespace: dev
data:
  NODE_ENV: "production"
  FRONTEND_URL: "http://localhost:3000"
  DB_URL: "mongodb://kfc-mongodb:27017/kfc-database"
---
apiVersion: v1
kind: Secret
metadata:
  name: kfc-secrets
  namespace: dev
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded values
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=  # admin
  MONGO_INITDB_ROOT_PASSWORD: YWRtaW4xMjM0NTY=  # admin123456
  MONGO_INITDB_DATABASE: a2ZjLWRhdGFiYXNl  # kfc-database