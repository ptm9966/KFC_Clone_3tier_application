apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfc-mongodb
  namespace: dev
  labels:
    app: kfc-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kfc-mongodb
  template:
    metadata:
      labels:
        app: kfc-mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: kfc-secrets
              key: MONGO_INITDB_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kfc-secrets
              key: MONGO_INITDB_ROOT_PASSWORD
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: kfc-secrets
              key: MONGO_INITDB_DATABASE
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: mongodb-config
          mountPath: /data/configdb
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d/
      volumes:
      - name: mongodb-data
        persistentVolumeClaim:
          claimName: mongodb-pvc
      - name: mongodb-config
        persistentVolumeClaim:
          claimName: mongodb-config-pvc
      - name: init-script
        configMap:
          name: mongodb-init-config
---
apiVersion: v1
kind: Service
metadata:
  name: kfc-mongodb
  namespace: dev
  labels:
    app: kfc-mongodb
spec:
  selector:
    app: kfc-mongodb
  ports:
  - port: 27017
    targetPort: 27017
  #clusterIP: None  # Headless service for MongoDB
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-config-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
