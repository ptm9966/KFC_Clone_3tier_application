apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfc-backend
  namespace: dev
  labels:
    app: kfc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kfc-backend
  template:
    metadata:
      labels:
        app: kfc-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/ptm9966/kcf_backend:6160a17fee7fc73e905e84f69bbf0bab806285ba
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: kfc-config
              key: NODE_ENV
        - name: PORT
          value: "8080"
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: kfc-config
              key: DB_URL
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: kfc-config
              key: FRONTEND_URL
        readinessProbe:
          httpGet:
            path: /api-docs
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api-docs
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: dev
  labels:
    app: kfc-backend
spec:
  selector:
    app: kfc-backend
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP