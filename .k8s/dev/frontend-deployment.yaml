apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfc-frontend
  namespace: dev
  labels:
    app: kfc-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kfc-frontend
  template:
    metadata:
      labels:
        app: kfc-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/ptm9966/kcf_frontend:d117b109543486514fb6d9ed35dc2cdc3ce3ac5d
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_BACKEND_URL
          value: "/"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: dev
  labels:
    app: kfc-frontend
spec:
  selector:
    app: kfc-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer